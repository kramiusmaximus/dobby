services:
  obsidian:
    image: lscr.io/linuxserver/obsidian:latest
    restart: unless-stopped
    environment:
      PUID: "0"
      PGID: "0"
      TZ: ${APP_TIMEZONE:-Europe/Moscow}
      CUSTOM_USER: ${OBSIDIAN_GUI_USER:-mark}
      PASSWORD: ${OBSIDIAN_GUI_PASSWORD:-dobby-local-only}
      PIXELFLUX_WAYLAND: "false"
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:3001:3001"
      - "127.0.0.1:27123:27123"
    volumes:
      - ./obsidian-config:/config
      - ./wiki:/config/dobby
    shm_size: "1gb"

  app:
    build: .
    command: uvicorn dobby_app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    depends_on:
      - obsidian
      - postgres
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./wiki:/app/wiki
      - ./assets:/app/assets
      - ./telegram_bot_cli/voice_messages:/app/storage/media/voice_messages
      - ./telegram_bot_cli/media_messages:/app/storage/media/media_messages
      - ./data:/app/data

  worker:
    build: .
    command: python -m dobby_app.worker
    env_file: .env
    depends_on:
      - obsidian
      - postgres
      - redis
    volumes:
      - ./wiki:/app/wiki
      - ./assets:/app/assets
      - ./telegram_bot_cli/voice_messages:/app/storage/media/voice_messages
      - ./telegram_bot_cli/media_messages:/app/storage/media/media_messages
      - ./data:/app/data

  poller:
    build: .
    command: python -m dobby_app.poller
    env_file: .env
    depends_on:
      - obsidian
      - postgres
      - redis
    volumes:
      - ./wiki:/app/wiki
      - ./assets:/app/assets
      - ./telegram_bot_cli/voice_messages:/app/storage/media/voice_messages
      - ./telegram_bot_cli/media_messages:/app/storage/media/media_messages
      - ./data:/app/data

  scheduler:
    build: .
    command: python -m dobby_app.scheduler
    env_file: .env
    depends_on:
      - obsidian
      - postgres
      - redis
    volumes:
      - ./wiki:/app/wiki
      - ./data:/app/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dobby
      POSTGRES_USER: dobby
      POSTGRES_PASSWORD: dobby
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:

name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run lint
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest -q

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build app image
        run: docker build -t dobby-app:${{ github.sha }} .

name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: ["completed"]
    branches: ["main"]

concurrency:
  group: dobby-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: [self-hosted, dobby-vps]
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      DEPLOY_PATH: /opt/dobby

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Deploy release
        run: |
          set -euo pipefail
          mkdir -p "$DEPLOY_PATH"
          if [ -f "$DEPLOY_PATH/.env" ]; then
            cp "$DEPLOY_PATH/.env" /tmp/dobby.env
          fi

          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='memory' \
            --exclude='.venv' \
            --exclude='.pytest_cache' \
            --exclude='.ruff_cache' \
            --exclude='*.egg-info' \
            -czf /tmp/dobby-release.tgz .

          find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 ! -name .env ! -name memory ! -name obsidian-config -exec rm -rf {} +
          tar -xzf /tmp/dobby-release.tgz -C "$DEPLOY_PATH"

          if [ ! -d "$DEPLOY_PATH/memory" ] && [ -d memory ]; then
            cp -a memory "$DEPLOY_PATH/memory"
          fi
          printf '%s\n' '${{ github.event.workflow_run.head_sha }}' > "$DEPLOY_PATH/.dobby-version"

          if [ -f /tmp/dobby.env ]; then
            mv /tmp/dobby.env "$DEPLOY_PATH/.env"
          elif [ -f "$DEPLOY_PATH/.env.example" ]; then
            cp "$DEPLOY_PATH/.env.example" "$DEPLOY_PATH/.env"
          fi

          cd "$DEPLOY_PATH"
          python3 deployment/setup_obsidian_local_rest.py "$DEPLOY_PATH"
          docker compose build app worker scheduler poller
          docker compose up -d obsidian
          docker compose up -d --force-recreate app worker scheduler poller
          for attempt in {1..30}; do
            if curl -fsS http://localhost:8000/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs --no-color --tail=100 app
          exit 1
